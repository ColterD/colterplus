site_name: Colter+
site_description: Personal blog and project portfolio of Colter Dahlberg.
site_author: Colter Dahlberg
site_url: https://colter.plus
repo_url: https://github.com/ColterD/colterplus
repo_name: ColterD/colterplus

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - navigation.expand
    - navigation.indexes
    - navigation.sections
    - navigation.path
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - header.autohide
    - content.action.edit
    - content.tabs.link
    - content.tooltips
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  icon:
    logo: material/account
    repo: fontawesome/brands/github
  favicon: favicon.png
  custom_dir: docs/overrides

plugins:
  - search
  - awesome-pages
  - blog:
      enabled: true
      readtime: true
      blog_dir: blog

markdown_extensions:
  - admonition      

nav:
  - Home: index.md
  - About: about.md
  - Projects: projects/index.md
  - Blog: blog/index.md
  - Contact: contact.md

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/yourusername
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/yourusername
    - icon: fontawesome/brands/mastodon
      link: https://your.mastodon.server/@yourusername
    # Add more social links as needed