# Project information
site_name: Colter+
site_description: >-
  The next-generation of free computer code.
site_url: https://colterplus.github.io/

# Repository
repo_name: colterplus/colterplus.github.io
repo_url: https://github.com/colterplus/colterplus.github.io
edit_uri: blob/main/docs/

# Copyright
copyright: Copyright © 2016 - 2024 Colter+

# Configuration
theme:
  name: material
  custom_dir: docs/overrides
  favicon: assets/images/favicon.ico
  logo: assets/images/logo.svg

  icon:
    repo: fontawesome/brands/github

  # Static files
  static_templates:
    - 404.html

  # Don't include MkDocs' JavaScript
  include_search_page: false
  search_index_only: true

  # Default values, taken from mkdocs_theme.yml
  language: en
  features:
    - content.code.annotate
    - content.tabs.link
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest

  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: rgb(33, 42, 49)
      accent: rgb(46, 57, 68)
      toggle:
        icon: material/lightbulb
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: rgb(33, 42, 49)
      accent: rgb(46, 57, 68)
      toggle:
        icon: material/lightbulb-outline
        name: Switch to dark mode
  font:
    text: Roboto
    code: Roboto Mono

# Plugins
plugins:
  - search:
      lang:
        - en

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Page tree
nav:
  - Home: index.md
  - About: about.md
  - License: license.md
  - Privacy: privacy.md
  - Code of Conduct: code-of-conduct.md
  - Contributing: contributing.md
  - Security: security.md
  - Status: status.md
  - Contact: contact.md

# Google analytics setup
extra:
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY